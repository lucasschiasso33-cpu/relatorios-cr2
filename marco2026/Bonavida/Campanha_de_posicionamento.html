<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Campanha de posicionamento</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Arial,sans-serif;background:#0D1B2A;color:#fff;min-height:100vh;padding:40px 20px}
  .header{text-align:center;margin-bottom:32px}
  .logo{font-size:12px;color:#aaa;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
  h1{font-size:22px;color:#fff;margin-bottom:4px}
  .empresa{font-size:14px;color:#2563EB}
  .lista{width:100%;max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
  .arquivo{display:flex;align-items:center;gap:14px;background:#1A3A5C;padding:14px 18px;border-radius:8px;cursor:pointer;transition:background .2s;user-select:none}
  .arquivo:hover{background:#2563EB}
  .num{font-size:11px;color:#aaa;min-width:20px}
  .nome{flex:1;font-size:14px;word-break:break-all}
  .ext{font-size:10px;background:#0D1B2A;color:#aaa;padding:2px 6px;border-radius:3px}
  .btn{font-size:12px;background:#2563EB;color:#fff;padding:5px 14px;border-radius:4px;white-space:nowrap;min-width:40px;text-align:center}
  .arquivo:hover .btn{background:#fff;color:#2563EB}
  .preview{display:none;background:#111;padding:12px;border-radius:0 0 8px 8px;margin-top:-4px}
  .preview.open{display:block}
  .rodape{text-align:center;margin-top:32px;font-size:12px;color:#555}
</style>
</head>
