<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fotos Ana Mel</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Arial,sans-serif;background:#0D1B2A;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
  .logo{font-size:12px;color:#aaa;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
  h1{font-size:22px;color:#fff;margin-bottom:4px;text-align:center;max-width:600px}
  .empresa{font-size:14px;color:#2563EB;margin-bottom:32px}
  .lista{width:100%;max-width:600px;display:flex;flex-direction:column;gap:10px}
  .arquivo{display:flex;align-items:center;gap:14px;background:#1A3A5C;padding:14px 18px;border-radius:8px;text-decoration:none;color:#fff;transition:background .2s}
  .arquivo:hover{background:#2563EB}
  .num{font-size:11px;color:#aaa;min-width:20px}
  .nome{flex:1;font-size:14px;word-break:break-all}
  .btn{font-size:12px;background:#2563EB;color:#fff;padding:5px 12px;border-radius:4px;white-space:nowrap}
  .arquivo:hover .btn{background:#fff;color:#2563EB}
  .rodape{margin-top:32px;font-size:12px;color:#555}
</style>
</head>
<body>
  <div class="logo">CR2 Marketing</div>
  <h1>Fotos Ana Mel</h1>
  <div class="empresa">Biotil</div>
  <div class="lista">
        <a href="https://drive.google.com/drive/folders/1pPoyGhP4ElBt7LUhquHI_iZaCKk1JTlW" target="_blank" class="arquivo">
          <span class="num">01</span>
          <span class="nome">1pPoyGhP4ElBt7LUhquHI_iZaCKk1JTlW</span>
          <span class="btn">Abrir</span>
        </a></div>
  <div class="rodape">Relatorio de Entregas - Marco 2026</div>
</body>
</html>
